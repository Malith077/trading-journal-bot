name: Deploy Trading Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Sync Files to Pi
        run: |
          # Sync files while protecting all local data stores
          rsync -avz --delete \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude 'downloads/' \
            --exclude 'knowledge_base/' \
            --exclude 'chroma_db/' \
            --exclude 'master_insights.json' \
            --exclude 'last_analyzed.txt' \
            --exclude '.req_hash' \
            --exclude '.git/' \
            ./ /home/malith/bot/

      - name: 3. Update System Service File
        run: |
          # Overwrite the old system configuration with the one from the repo
          sudo cp /home/malith/bot/tradingbot.service /etc/systemd/system/tradingbot.service
          
          # Tell the Pi to reload the new configuration
          sudo systemctl daemon-reload
          
          # Ensure the service is set to start on boot
          sudo systemctl enable tradingbot

      - name: 4. Update Dependencies & Restart
        run: |
          cd /home/malith/bot

          # Wipe the venv to clear out the legacy ChromaDB/Pydantic versions
          rm -rf venv
          python3 -m venv venv
          
          # Install fresh modern dependencies
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

          # Ensure the embedding model is ready
          ollama pull nomic-embed-text

          # Run the re-index script
          ./venv/bin/python scripts/reindex_all.py
          
          # Restart the bot
          sudo systemctl restart tradingbot

      - name: 5. Verify Deployment Health
        run: |
          # Wait a few seconds for the bot to attempt to log in
          sleep 10
          
          # Check if the service is still active
          if sudo systemctl is-active --quiet tradingbot; then
            echo "✅ Bot is running successfully!"
          else
            echo "❌ Bot failed to start or crashed after restart!"
            # Get the last 20 lines of logs to show in GitHub Actions
            sudo journalctl -u tradingbot -n 20
            exit 1
          fi