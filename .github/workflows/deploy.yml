name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync to Production Folder
        run: |
          # Sync from the runner's temporary workspace to your actual bot folder
          # We exclude .env and downloads to keep your secrets and data safe
          rsync -avz --delete \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude 'downloads/' \
            --exclude '.git/' \
            ./ /home/malith/bot/
          
          # Move to the bot folder to finish setup
          cd /home/malith/bot
          
          # Install any new dependencies
          ./venv/bin/pip install -r requirements.txt
          
          # Restart the service
          sudo systemctl restart tradingbot