name: Deploy Trading Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Sync Files to Pi
        run: |
          # Sync all files except local data, secrets, and the virtual env
          rsync -avz --delete \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude 'downloads/' \
            --exclude '.git/' \
            ./ /home/malith/bot/

      - name: 3. Update System Service File
        run: |
          # Overwrite the old system configuration with the one from the repo
          sudo cp /home/malith/bot/tradingbot.service /etc/systemd/system/tradingbot.service
          
          # Tell the Pi to reload the new configuration
          sudo systemctl daemon-reload
          
          # Ensure the service is set to start on boot
          sudo systemctl enable tradingbot

      - name: 4. Update Dependencies & Restart
        run: |
          cd /home/malith/bot
          
          # Create venv only if it was wiped (e.g., after a reflash)
          if [ ! -d "venv" ]; then
              python3 -m venv venv
          fi
          
          # Install any new libraries from requirements.txt
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
          
          # Restart the bot (stops the old version, starts the new version)
          sudo systemctl restart tradingbot