name: Run Tests

on:
  push:
    branches:
      - '**'        # Matches every branch
      - '!main'     # Exclude main (since deploy.yml already tests main)
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Change this if your bot requires a specific version
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-aiohttp

      - name: Run Tests
        run: |
          pytest tests/ -v
